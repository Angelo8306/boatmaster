<!DOCTYPE html>

<html class="light" lang="de"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Epilogue:ital,wght@0,400;0,700;1,400;1,700&amp;family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#3B1117",
                        "accent": "#D4467A",
                        "background": "#F5F0E8",
                        "surface": "#FFFFFF",
                        "on-surface": "#2C1810",
                        "muted-brown": "#6B5B4E",
                        "gradient-end": "#5A1A24"
                    },
                    fontFamily: {
                        "headline": ["Epilogue", "serif"],
                        "body": ["Plus Jakarta Sans", "sans-serif"],
                    },
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #F5F0E8; color: #2C1810; }
        .serif-italic { font-family: 'Epilogue', serif; font-style: italic; }
        .seensucht-logo {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: linear-gradient(to bottom, #2C1810 50%, #F5F0E8 50%);
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(44, 24, 16, 0.1);
        }
        .seensucht-sail {
            position: absolute;
            bottom: 2px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 8px solid transparent;
            border-right: 8px solid transparent;
            border-bottom: 14px solid #D4467A;
        }
    </style>
</head>
<body class="select-none min-h-screen">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-[#F5F0E8]/90 backdrop-blur-md flex justify-between items-center px-6 h-16 border-b border-[#2C1810]/5">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-[#3B1117] cursor-pointer hover:opacity-70 transition-opacity active:scale-95 duration-150">arrow_back</span>
<h1 class="serif-italic text-xl text-[#3B1117] tracking-tight">IALA Tonnensystem</h1>
</div>
<div class="flex items-center gap-4">
<div class="text-[10px] tracking-widest uppercase font-bold text-[#6B5B4E]">1 / 14</div>
<div class="seensucht-logo">
<div class="seensucht-sail"></div>
</div>
</div>
</header>
<main class="pt-20 pb-36 px-6 max-w-lg mx-auto min-h-screen flex flex-col">
<!-- Progress Bar Hierarchy -->
<div class="flex gap-1.5 mb-10 w-full">
<div class="h-0.5 flex-1 rounded-full bg-[#3B1117]"></div>
<div class="h-0.5 flex-1 rounded-full bg-[#2C1810]/10"></div>
<div class="h-0.5 flex-1 rounded-full bg-[#2C1810]/10"></div>
<div class="h-0.5 flex-1 rounded-full bg-[#2C1810]/10"></div>
<div class="h-0.5 flex-1 rounded-full bg-[#2C1810]/10"></div>
<div class="h-0.5 flex-1 rounded-full bg-[#2C1810]/10"></div>
<div class="h-0.5 flex-1 rounded-full bg-[#2C1810]/10"></div>
<div class="h-0.5 flex-1 rounded-full bg-[#2C1810]/10"></div>
<div class="h-0.5 flex-1 rounded-full bg-[#2C1810]/10"></div>
<div class="h-0.5 flex-1 rounded-full bg-[#2C1810]/10"></div>
</div>
<!-- Flashcard Surface -->
<div class="bg-white rounded-[2rem] shadow-[0_20px_50px_rgba(44,24,16,0.06)] overflow-hidden flex-grow flex flex-col border border-[#2C1810]/5">
<!-- Image Area -->
<div class="relative aspect-[4/3] w-full bg-[#F5F0E8] overflow-hidden">
<img alt="Nautical Red Buoy" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCiVhOZ8prAG5upQiK4_JqmZscSFF_EK02rfTM9p7-DvFK9YgvpStmyW5pDPikXmieoZ--j6n0GiBvsBn2vTfdb2sXsov05bCLUo0CNDo4ftP1_jLDfF5qJyPdcjPn5N2-IIacsCpO6VjgEkIlKfDN0Ww-ZEHvSfhEX9hhvk7_Z2XmthFAqnCMBOt7aY_MAONHflz15wW6Q-RjUAT4tMdfvCkUqLYZn3XdjlZYpCz6Q5NvXoTnxgsvczoQnNTOmxYwFJf0bgu63OUk"/>
<div class="absolute top-5 right-5 bg-[#3B1117] px-3 py-1 rounded-full shadow-lg">
<span class="text-white text-[10px] font-bold tracking-widest">EN</span>
</div>
</div>
<!-- Content Area -->
<div class="p-10 flex-grow flex flex-col">
<span class="text-[10px] font-bold tracking-[0.25em] text-[#6B5B4E] mb-3 uppercase">Fachbegriff</span>
<h2 class="text-4xl serif-italic text-[#3B1117] mb-8">Fairway</h2>
<div class="pl-6 border-l border-[#D4467A]/30 py-1">
<p class="text-[#2C1810] leading-relaxed text-lg font-normal serif-italic opacity-90">
                        A sea belt sufficiently deep and wide for safe navigation, marked with proper markings.
                    </p>
</div>
</div>
</div>
<!-- Action Bar -->
<div class="mt-10 flex items-center justify-between gap-4">
<!-- Speaker -->
<button class="w-14 h-14 rounded-full bg-[#3B1117] flex items-center justify-center text-white shadow-xl active:scale-90 transition-transform hover:opacity-90">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">volume_up</span>
</button>
<!-- Language Toggle -->
<button class="h-14 px-8 rounded-full border border-[#D4467A] bg-transparent text-[#D4467A] font-bold tracking-wide flex items-center gap-2 hover:bg-[#D4467A]/5 transition-colors">
                Deutsch
            </button>
<!-- Next Button -->
<button class="h-14 flex-grow px-6 rounded-full bg-gradient-to-br from-[#3B1117] to-[#5A1A24] text-white font-bold text-lg flex items-center justify-center gap-2 shadow-xl active:scale-95 transition-all">
                Weiter
                <span class="material-symbols-outlined text-sm">play_arrow</span>
</button>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full bg-[#F5F0E8]/80 backdrop-blur-xl flex justify-around items-center px-4 pb-8 pt-4 z-50 rounded-t-[2.5rem] shadow-[0_-10px_40px_rgba(44,24,16,0.04)]">
<div class="flex flex-col items-center justify-center text-[#6B5B4E] hover:text-[#3B1117] transition-colors cursor-pointer">
<span class="material-symbols-outlined text-2xl">home</span>
<span class="text-[10px] font-medium tracking-[0.05em] uppercase mt-1.5">Home</span>
</div>
<!-- Active Tab -->
<div class="flex flex-col items-center justify-center text-[#3B1117] scale-110 transition-transform">
<span class="material-symbols-outlined text-2xl" style="font-variation-settings: 'FILL' 1;">school</span>
<span class="text-[10px] font-bold tracking-[0.05em] uppercase mt-1.5">Lernen</span>
</div>
<div class="flex flex-col items-center justify-center text-[#6B5B4E] opacity-60 hover:opacity-100 transition-opacity cursor-pointer">
<span class="material-symbols-outlined text-2xl">call</span>
<span class="text-[10px] font-medium tracking-[0.05em] uppercase mt-1.5">Anrufen</span>
</div>
<div class="flex flex-col items-center justify-center text-[#6B5B4E] opacity-60 hover:opacity-100 transition-opacity cursor-pointer">
<span class="material-symbols-outlined text-2xl">volume_up</span>
<span class="text-[10px] font-medium tracking-[0.05em] uppercase mt-1.5">Audio</span>
</div>
<div class="flex flex-col items-center justify-center text-[#6B5B4E] opacity-60 hover:opacity-100 transition-opacity cursor-pointer">
<span class="material-symbols-outlined text-2xl">assignment</span>
<span class="text-[10px] font-medium tracking-[0.05em] uppercase mt-1.5">Prüfung</span>
</div>
</nav>
</body></html>
