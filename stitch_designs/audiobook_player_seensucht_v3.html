<body class="bg-creme font-body text-on-surface antialiased min-h-screen flex flex-col">

<header class="fixed top-0 w-full z-50 bg-[#F5F0E8]/80 backdrop-blur-md shadow-[0_12px_40px_rgba(39,24,20,0.06)] flex items-center justify-between px-6 h-16">
<div class="flex items-center gap-4">
<button class="hover:opacity-80 transition-opacity active:scale-95">
<span class="material-symbols-outlined text-dark-burgundy">arrow_back</span>
</button>
<div class="flex flex-col">
<h1 class="font-serif italic text-dark-burgundy text-lg leading-tight">IALA Tonnensystem</h1>
<span class="font-label text-[10px] tracking-widest text-dark-burgundy/60 font-bold uppercase">Segment 3/14</span>
</div>
</div>
<div class="flex items-center gap-2">
<div class="w-10 h-10 rounded-full bg-dark-burgundy flex items-center justify-center text-creme overflow-hidden">
<span class="material-symbols-outlined text-2xl" style="font-variation-settings: 'FILL' 1;">waves</span>
</div>
</div>
</header>
<main class="flex-grow pt-24 pb-32 px-6 max-w-2xl mx-auto w-full">

<section class="flex flex-col items-center mb-12">
<!-- Text Display Card -->
<div class="w-full bg-surface-container-lowest rounded-[2rem] p-10 mb-10 shadow-[0_20px_50px_rgba(39,24,20,0.04)] relative">
<div class="absolute -top-3 left-10">
<span class="bg-dark-burgundy text-white font-label text-[10px] font-bold px-3 py-1 rounded-full tracking-widest">EN</span>
</div>
<blockquote class="font-serif italic text-2xl md:text-3xl text-dark-burgundy leading-relaxed text-center">
                    "The port-hand mark is red, can be in the shape of a cylinder, and shows a red light."
                </blockquote>
</div>
<!-- Timeline -->
<div class="w-full mb-8">
<div class="relative w-full h-2 bg-surface-container-highest rounded-full overflow-hidden mb-3">
<div class="absolute left-0 top-0 h-full bg-dark-burgundy w-1/3 rounded-full"></div>
</div>
<div class="flex justify-between font-label text-xs font-bold tracking-tight text-dark-burgundy/60">
<span>04:12</span>
<span>12:45</span>
</div>
</div>
<!-- Controls -->
<div class="flex items-center gap-10">
<button class="hover:opacity-80 transition-opacity active:scale-90 flex flex-col items-center">
<span class="material-symbols-outlined text-3xl text-dark-burgundy">replay_10</span>
</button>
<button class="w-16 h-16 rounded-full bg-dark-burgundy flex items-center justify-center text-white shadow-xl hover:opacity-90 active:scale-95 transition-all">
<span class="material-symbols-outlined text-4xl" style="font-variation-settings: 'FILL' 1;">pause</span>
</button>
<button class="hover:opacity-80 transition-opacity active:scale-90 flex flex-col items-center">
<span class="material-symbols-outlined text-3xl text-dark-burgundy">forward_30</span>
</button>
</div>
</section>
<!-- Segment List -->
<section class="space-y-1">
<h3 class="font-label text-[10px] font-bold tracking-[0.2em] text-dark-burgundy/40 uppercase mb-4 px-2">Kapitel Segmente</h3>
<div class="space-y-2">
<!-- Segment 01 -->
<div class="flex items-center justify-between p-4 bg-surface-container-low rounded-2xl hover:bg-surface-container transition-colors group cursor-pointer">
<div class="flex items-center gap-4">
<span class="font-label text-xs font-bold text-dark-burgundy/40">01</span>
<span class="font-medium text-dark-burgundy">Einleitung</span>
</div>
<span class="material-symbols-outlined text-dark-burgundy/20 group-hover:text-dark-burgundy transition-colors">play_circle</span>
</div>
<!-- Segment 02 -->
<div class="flex items-center justify-between p-4 bg-surface-container-low rounded-2xl hover:bg-surface-container transition-colors group cursor-pointer">
<div class="flex items-center gap-4">
<span class="font-label text-xs font-bold text-dark-burgundy/40">02</span>
<span class="font-medium text-dark-burgundy">Laterale Zeichen</span>
</div>
<span class="material-symbols-outlined text-dark-burgundy/20 group-hover:text-dark-burgundy transition-colors">play_circle</span>
</div>
<!-- Segment 03 - ACTIVE -->
<div class="flex items-center justify-between p-4 bg-surface-container-highest/50 border border-outline-variant/20 rounded-2xl cursor-default shadow-sm">
<div class="flex items-center gap-4">
<span class="font-label text-xs font-bold text-primary">03</span>
<span class="font-bold text-dark-burgundy">Port-Hand Mark</span>
</div>
<div class="flex gap-0.5">
<div class="w-1 h-3 bg-primary rounded-full animate-pulse"></div>
<div class="w-1 h-5 bg-primary rounded-full"></div>
<div class="w-1 h-4 bg-primary rounded-full animate-pulse"></div>
</div>
</div>

<div class="flex items-center justify-between p-4 bg-surface-container-low rounded-2xl opacity-60">
<div class="flex items-center gap-4">
<span class="font-label text-xs font-bold text-dark-burgundy/40">04</span>
<span class="font-medium text-dark-burgundy">Starboard-Hand Mark</span>
</div>
<span class="material-symbols-outlined text-dark-burgundy/20">lock</span>
</div>
</div>
</section>
